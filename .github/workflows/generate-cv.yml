name: Generate CV PDF

on:
  push:
    branches: [main]
    paths:
      - 'public/cv-data.json'
      - 'src/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      vault_root:
        description: 'Path to my-obsidian vault (ignored in CI — uses artifact)'
        required: false
        default: ''

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate PDF
        run: npm run generate
        env:
          PROFILE_DATA: ${{ secrets.CV_PROFILE_DATA }}

      - name: Commit PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv/*.pdf
          git diff --staged --quiet && echo "No new PDF" || git commit -m "chore: update CV PDF $(date +%Y-%m)"
          git push
